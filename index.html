<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BYFORT 6080K DIAMOND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Inter', sans-serif;
        }

        .app-container {
            position: relative; width: 100%; height: 100vh;
            display: flex; flex-direction: column;
            padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
        }

        #camera-view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }
        
        /* Efek Mirroring untuk Kamera Depan (Kepala kanan -> Layar Kiri) */
        .mirror-mode { transform: scaleX(-1); }

        .ai-diamond-ultra {
            filter: brightness(1.3) contrast(1.1) saturate(1.2) sharpness(1.5);
        }

        .overlay { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .overlay * { pointer-events: auto; }

        #notif {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 15px 35px; border-radius: 50px;
            font-weight: 900; box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            z-index: 2000; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 12px; font-size: 13px;
        }

        #flash-menu {
            position: absolute; top: 80px; right: 20px; 
            background: rgba(15,15,15,0.98); border-radius: 24px;
            display: none; flex-direction: column; border: 1px solid rgba(255,255,255,0.15);
            z-index: 100; backdrop-filter: blur(30px);
        }
        .flash-opt { padding: 22px 35px; color: white; font-size: 12px; font-weight: 900; border-bottom: 1px solid #222; }

        .shutter-outer { width: 95px; height: 95px; border: 6px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .shutter-inner { width: 75px; height: 75px; background: #fff; border-radius: 50%; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .recording .shutter-inner { background: #ff3b30; border-radius: 20px; transform: scale(0.6); }

        #gallery-page {
            position: fixed; inset: 0; background: #000; z-index: 500;
            display: none; flex-direction: column; padding: var(--safe-top) 20px var(--safe-bottom);
        }
        .grid-view { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; overflow-y: auto; }
        .grid-item { aspect-ratio: 1/1; background: #050505; border-radius: 22px; overflow: hidden; position: relative; border: 1px solid #1a1a1a; }

        #full-view {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-ui { flex: 1; padding: 22px; border-radius: 22px; font-weight: 900; font-size: 13px; text-align: center; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="notif"><i class="fas fa-bolt-lightning text-yellow-500"></i> <span id="notif-text">BYFORT 6080K DIAMOND</span></div>

    <div class="app-container">
        <video id="camera-view" class="ai-diamond-ultra" autoplay playsinline muted></video>
        <canvas id="diamond-canvas"></canvas>

        <div class="overlay p-8">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-white font-black text-3xl italic tracking-tighter">BYFORT <span class="text-blue-500">6080K</span></h1>
                    <div class="text-[10px] text-blue-400 font-bold bg-blue-900/40 px-3 py-1.5 rounded-full inline-block mt-1">ULTRA HD DIAMOND PRO</div>
                </div>
                <div class="relative">
                    <button onclick="toggleFlashUI()" class="w-14 h-14 rounded-full bg-black/70 flex items-center justify-center text-white border border-white/20 shadow-2xl">
                        <i id="f-ico" class="fas fa-bolt-slash"></i>
                    </button>
                    <div id="flash-menu">
                        <div class="flash-opt" onclick="setFlashMode('on')">HIDUPKAN FLASH</div>
                        <div class="flash-opt text-red-500" onclick="setFlashMode('off')">MATIKAN FLASH</div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-10 mb-8">
                <div class="flex justify-center gap-16 text-white text-[12px] font-black tracking-[0.3em]">
                    <button id="p-mode" onclick="appMode('poto')" class="text-blue-500 border-b-4 border-blue-500 pb-1">POTO</button>
                    <button id="v-mode" onclick="appMode('video')" class="opacity-30">VIDEO</button>
                </div>

                <div class="flex justify-between items-center px-2">
                    <div onclick="openGallery()" id="mini-p" class="w-16 h-16 rounded-2xl border-2 border-white/20 bg-gray-900 overflow-hidden flex items-center justify-center">
                        <i class="fas fa-images text-white/10 text-2xl"></i>
                    </div>

                    <div class="shutter-outer" onclick="runCapture()">
                        <div class="shutter-inner" id="s-btn"></div>
                    </div>

                    <button onclick="flipCamera()" class="w-16 h-16 rounded-full bg-white/10 flex items-center justify-center text-white text-3xl">
                        <i class="fas fa-camera-rotate"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="gallery-page">
        <div class="flex justify-between items-center py-10">
            <h2 class="text-white text-3xl font-black italic">BYFORT <span class="text-blue-500">VAULT</span></h2>
            <button onclick="closeGallery()" class="bg-white text-black px-6 py-2.5 rounded-full font-black text-[11px]">BACK</button>
        </div>
        <div id="v-grid" class="grid-view"></div>
    </div>

    <div id="full-view">
        <button onclick="closeFull()" class="absolute top-12 right-8 text-white text-4xl"><i class="fas fa-times-circle"></i></button>
        <div id="f-media" class="w-full h-full flex items-center justify-center"></div>
        <div class="flex gap-4 absolute bottom-12 w-[85%]">
            <button onclick="delItem()" class="btn-ui bg-red-600/20 text-red-500 border border-red-600/40">HAPUS</button>
            <a id="dl-btn" class="btn-ui bg-blue-600 text-white">UNDUH 6080K</a>
        </div>
    </div>

    <script>
        let stream, recorder, chunks = [], media = [], isFront = false, flash = 'off', currentMode = 'poto', activeId = null;
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('diamond-canvas');
        const shutterSfx = new Audio('https://www.soundjay.com/mechanical/camera-shutter-click-08.mp3');

        async function init() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            
            // Logika Mirroring Kamera Depan (Kanan ke Kiri)
            if (isFront) video.classList.add('mirror-mode');
            else video.classList.remove('mirror-mode');

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: isFront ? "user" : "environment", width: 6080, height: 3420 },
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                });
                video.srcObject = stream;
                // Tetapkan status flash saat pindah kamera
                if(flash === 'on') setHardwareTorch(true);
            } catch (err) { alert("Izinkan akses kamera BYFORT."); }
        }

        async function setHardwareTorch(state) {
            try {
                const track = stream.getVideoTracks()[0];
                const caps = track.getCapabilities();
                if (caps.torch) await track.applyConstraints({ advanced: [{ torch: state }] });
            } catch (e) { console.log("Hardware Flash tidak merespon."); }
        }

        function setFlashMode(val) {
            flash = val;
            document.getElementById('f-ico').className = val === 'on' ? 'fas fa-bolt text-yellow-500' : 'fas fa-bolt-slash';
            document.getElementById('flash-menu').style.display = 'none';
            setHardwareTorch(val === 'on');
            triggerNotif(val === 'on' ? "FLASH HIDUP" : "FLASH MATI");
        }

        function toggleFlashUI() {
            const m = document.getElementById('flash-menu');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        function triggerNotif(msg) {
            const n = document.getElementById('notif');
            document.getElementById('notif-text').innerText = msg;
            n.style.top = '40px';
            setTimeout(() => n.style.top = '-100px', 3000);
        }

        function appMode(m) {
            currentMode = m;
            document.getElementById('p-mode').className = m === 'poto' ? 'text-blue-500 border-b-4 border-blue-500 pb-1' : 'opacity-30';
            document.getElementById('v-mode').className = m === 'video' ? 'text-blue-500 border-b-4 border-blue-500 pb-1' : 'opacity-30';
            document.getElementById('s-btn').style.background = m === 'poto' ? '#fff' : '#ff3b30';
        }

        async function runCapture() {
            if (currentMode === 'poto') {
                shutterSfx.play();
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                if (isFront) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
                ctx.filter = "brightness(1.2) contrast(1.1) saturate(1.1) blur(0.2px)";
                ctx.drawImage(video, 0, 0);
                saveMedia(canvas.toDataURL('image/jpeg', 1.0), 'image');
                video.style.opacity = "0.3";
                setTimeout(() => video.style.opacity = "1", 150);
                triggerNotif("POTO DIAMOND DISIMPAN");
            } else {
                handleRecord();
            }
        }

        function handleRecord() {
            const s = document.querySelector('.shutter-outer');
            if (recorder && recorder.state === "recording") {
                recorder.stop();
                s.classList.remove('recording');
            } else {
                chunks = [];
                recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', bitsPerSecond: 12000000 });
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const url = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
                    saveMedia(url, 'video');
                    triggerNotif("VIDEO DIAMOND DISIMPAN");
                };
                recorder.start();
                s.classList.add('recording');
            }
        }

        function saveMedia(url, type) {
            const id = Date.now();
            media.unshift({ id, url, type });
            document.getElementById('mini-p').innerHTML = `<img src="${url}" class="w-full h-full object-cover">`;
            syncGallery();
        }

        function syncGallery() {
            const g = document.getElementById('v-grid');
            g.innerHTML = media.map(m => `
                <div class="grid-item shadow-2xl" onclick="openFull(${m.id})">
                    ${m.type === 'image' ? `<img src="${m.url}" class="w-full h-full object-cover">` : `<video src="${m.url}" class="w-full h-full object-cover"></video><div class="absolute inset-0 flex items-center justify-center"><i class="fas fa-play text-white text-3xl opacity-60"></i></div>`}
                </div>
            `).join('');
        }

        function openFull(id) {
            activeId = id;
            const item = media.find(x => x.id === id);
            const content = document.getElementById('f-media');
            const dl = document.getElementById('dl-btn');
            content.innerHTML = item.type === 'image' ? `<img src="${item.url}" class="max-w-full max-h-full">` : `<video src="${item.url}" controls autoplay class="max-w-full max-h-full"></video>`;
            dl.href = item.url;
            dl.download = `BYFORT_6080K_${id}.${item.type === 'image' ? 'jpg' : 'webm'}`;
            document.getElementById('full-view').style.display = 'flex';
        }

        function delItem() {
            if(confirm("Hapus Item?")) {
                media = media.filter(x => x.id !== activeId);
                syncGallery();
                closeFull();
                if(media.length > 0) document.getElementById('mini-p').innerHTML = `<img src="${media[0].url}" class="w-full h-full object-cover">`;
                else document.getElementById('mini-p').innerHTML = `<i class="fas fa-images text-white/10 text-2xl"></i>`;
                triggerNotif("ITEM DIHAPUS");
            }
        }

        function flipCamera() { isFront = !isFront; init(); }
        function openGallery() { document.getElementById('gallery-page').style.display = 'flex'; }
        function closeGallery() { document.getElementById('gallery-page').style.display = 'none'; }
        function closeFull() { document.getElementById('full-view').style.display = 'none'; }

        window.onload = init;
    </script>
</body>
</html>
