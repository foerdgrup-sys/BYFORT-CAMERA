<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BYFORT PRO - Neon Core</title>
    <style>
        /* --- RESET & LAYOUT LOCK --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
            background-color: #020617;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* --- PURE MINIMALIST LOADING SCREEN --- */
        #byfort-splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #07152e 0%, #01040a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Elemen Centering Tanpa Kotak / Tanpa Border */
        .loader-pure-wrapper {
            width: 480px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Efek Teks BYFORT Mengkilap & Keren (Biru Tua Cerah) */
        .splash-logo {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 16px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #0052cc 0%, #0095ff 30%, #ffffff 50%, #0095ff 70%, #0052cc 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShine 3s linear infinite, logoPulse 2.5s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(0, 149, 255, 0.3));
        }

        /* Angka Persen - Diubah Menjadi Biru Tua Cerah */
        .percentage-wrapper {
            margin-bottom: 25px;
        }

        #byfort-counter {
            font-size: 3.8rem;
            font-weight: 900;
            color: #0095ff; /* Biru Tua Cerah */
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: -1px;
            text-shadow: 0 0 15px rgba(0, 149, 255, 0.5);
        }

        #byfort-counter span {
            font-size: 1.8rem;
            color: #0095ff; /* Persen Biru Tua Cerah */
            margin-left: 3px;
        }

        /* Kontainer Jalur Garis Loading */
        .progress-container {
            width: 80%;
            height: 7px;
            background: rgba(0, 149, 255, 0.05);
            border-radius: 100px;
            overflow: hidden;
            border: 1px solid rgba(0, 149, 255, 0.1);
        }

        /* Garis Loading Utama - Diubah Menjadi Gradasi Biru Tua Cerah Menyala */
        #byfort-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #0052cc, #0095ff, #38bdf8); /* Kombinasi Biru Tua Cerah */
            box-shadow: 0 0 14px rgba(0, 149, 255, 0.8);
            border-radius: 100px;
            transition: width 0.1s linear;
        }

        .system-status {
            margin-top: 25px;
            color: #475569;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* --- CORE WEBVIEW WRAPPER --- */
        #byfort-app-viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease-in;
            overflow: hidden;
        }

        #byfort-frame-engine {
            width: 1280px; /* Paksa Layout Desktop */
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            background-color: #ffffff;
        }

        /* --- SHIELD ALERTS --- */
        #security-alert {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #dc2626;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: bold;
            z-index: 100000;
            display: none;
            border: 1px solid #ff4444;
            box-shadow: 0 10px 30px rgba(220, 38, 38, 0.4);
        }

        /* --- CORE ANIMATIONS --- */
        @keyframes textShine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @media (max-width: 600px) {
            .loader-pure-wrapper { width: 100%; padding: 0 20px; }
            .splash-logo { font-size: 3.5rem; letter-spacing: 10px; }
            .progress-container { width: 90%; }
        }
    </style>
</head>
<body>

    <!-- 1. LUXURY LOADING SCREEN (NEON MINIMALIST) -->
    <div id="byfort-splash">
        <div class="loader-pure-wrapper">
            <!-- Teks Mengkilap Keren & Profesional (Biru Tua Cerah) -->
            <div class="splash-logo">BYFORT</div>
            
            <!-- Persenan Angka Warna Biru Tua Cerah -->
            <div class="percentage-wrapper">
                <div id="byfort-counter">0<span>%</span></div>
            </div>

            <!-- Garis Loading Warna Biru Tua Cerah -->
            <div class="progress-container">
                <div id="byfort-bar"></div>
            </div>

            <div class="system-status" id="status-text">Mengamankan Sistem...</div>
        </div>
    </div>

    <!-- 2. APPLIKASI VIEWPORT CORE -->
    <div id="byfort-app-viewport">
        <iframe 
            id="byfort-frame-engine" 
            src="https://byfort-agent--fimenggrup.replit.app/" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            allowfullscreen>
        </iframe>
    </div>

    <div id="security-alert">BYFORT SHIELD: Akses Tidak Sah Diblokir!</div>

    <script>
        /* ==========================================================================
           DESKTOP LAYOUT AUTOMATION (FULL PENUH & STABIL)
           ========================================================================== */
        const viewport = document.getElementById('byfort-app-viewport');
        const iframe = document.getElementById('byfort-frame-engine');
        const splash = document.getElementById('byfort-splash');
        const counter = document.getElementById('byfort-counter');
        const barFill = document.getElementById('byfort-bar');
        const statusText = document.getElementById('status-text');

        function forceDesktopLayout() {
            const winW = window.innerWidth;
            const winH = window.innerHeight;
            const scale = winW / 1280;
            
            iframe.style.width = "1280px";
            iframe.style.height = (winH / scale) + "px";
            iframe.style.transform = `scale(${scale})`;
            iframe.style.transformOrigin = "top left";
        }

        window.addEventListener('resize', forceDesktopLayout);
        window.addEventListener('orientationchange', forceDesktopLayout);
        forceDesktopLayout();

        /* ==========================================================================
           EXACT 2.5 SECONDS REAL-TIME LOADING CONTROLLER
           ========================================================================== */
        const statusMessages = [
            "Membangun Jalur Enkripsi...",
            "Mengaktifkan Firewall Berlapis...",
            "Sinkronisasi Antarmuka Desktop...",
            "Sistem Siap Aman 100%"
        ];

        window.addEventListener('DOMContentLoaded', () => {
            let progress = 0;
            const totalDuration = 2500; // Tepat 2,5 Detik
            const intervalStep = 20; 
            const increment = 100 / (totalDuration / intervalStep);

            const timer = setInterval(() => {
                progress += increment;
                
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(timer);
                    
                    setTimeout(() => {
                        splash.style.opacity = '0';
                        viewport.style.display = 'block';
                        
                        setTimeout(() => {
                            viewport.style.opacity = '1';
                            splash.style.display = 'none';
                            forceDesktopLayout();
                        }, 100);
                    }, 200);
                }

                // Inject data real-time ke UI
                counter.innerHTML = Math.floor(progress) + "<span>%</span>";
                barFill.style.width = progress + "%";

                if (progress > 75) statusText.innerText = statusMessages[3];
                else if (progress > 50) statusText.innerText = statusMessages[2];
                else if (progress > 25) statusText.innerText = statusMessages[1];
            }, intervalStep);
        });

        /* ==========================================================================
           24-HOUR CYBER REACTION SHIELD & GESTURE LOCK
           ========================================================================== */
        document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
        let lastTouchTime = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchTime <= 300) e.preventDefault();
            lastTouchTime = now;
        }, { passive: false });

        (function runShield() {
            const block = () => {
                document.getElementById('security-alert').style.display = 'block';
                document.body.innerHTML = '<div style="background:#01040a;color:#ef4444;height:100vh;display:flex;justify-content:center;align-items:center;font-family:sans-serif;text-align:center;"><h1>BYFORT SHIELD: TERMINAL / BOT ACCESS DENIED</h1></div>';
            };

            if (/bot|crawler|spider|headless|puppeteer|selenium|chatgpt|gemini/i.test(navigator.userAgent)) block();
            document.addEventListener('contextmenu', (e) => e.preventDefault());
            document.addEventListener('keydown', (e) => {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'U')) {
                    e.preventDefault();
                    block();
                }
            });
            setInterval(() => {
                if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) block();
            }, 500);
        })();
    </script>
</body>
</html>
